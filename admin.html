<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AOSUNLOCKER Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b12;
        --panel: rgba(13, 19, 31, 0.92);
        --line: rgba(109, 126, 164, 0.22);
        --text: #ecf2ff;
        --muted: #9aabc8;
        --accent: #ff6f61;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(255, 111, 97, 0.12), transparent 32%),
          linear-gradient(180deg, #0a101b 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .card {
        width: min(100%, 460px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 6vw, 42px);
        line-height: 1.02;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 14px;
        border: 1px solid rgba(255, 111, 97, 0.24);
        background: rgba(255, 111, 97, 0.1);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      .button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Admin Access</p>
      <h1>Opening Admin Panel</h1>
      <p id="status">Redirecting to the latest admin deployment...</p>
      <div class="actions">
        <a id="open-admin" class="button" href="#">Open Admin</a>
        <a class="button secondary" href="/">Back Home</a>
      </div>
    </main>
    <script src="/site-config.js"></script>
    <script>
      (function() {
        var config = window.AOSUNLOCKER_CONFIG || {};
        var adminUrl = String(config.adminUrl || '').trim();
        var statusNode = document.getElementById('status');
        var openLink = document.getElementById('open-admin');

        if (!adminUrl) {
          statusNode.textContent = 'Admin link is not configured yet.';
          openLink.removeAttribute('href');
          openLink.setAttribute('aria-disabled', 'true');
          return;
        }

        openLink.href = adminUrl;
        setTimeout(function() {
          window.location.replace(adminUrl);
        }, 220);
      })();
    </script>
  </body>
</html>
