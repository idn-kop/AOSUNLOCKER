<script>
  const state = {
    categories: [],
    recentFiles: [],
    searchResults: [],
    searchQuery: '',
    searchLoading: false,
    searchTotal: 0,
    editId: '',
    brands: [],
    categoryEditId: '',
    brandEditId: '',
    confirmResolver: null,
    integrity: null,
    integrityLoading: false,
    integrityExpanded: false,
  };
  let fileSearchTimer = 0;

  document.addEventListener('DOMContentLoaded', () => {
    google.script.run
      .withSuccessHandler(bootstrap)
      .withFailureHandler(showError)
      .getBootstrapData();

    document.getElementById('fileForm').addEventListener('submit', onSubmit);
    document.getElementById('brandForm').addEventListener('submit', onBrandSubmit);
    document.getElementById('categoryForm').addEventListener('submit', onCategorySubmit);
    document.getElementById('autofillButton').addEventListener('click', onAutofill);
    document.getElementById('cancelEditButton').addEventListener('click', resetFormState);
    document.getElementById('cancelBrandEditButton').addEventListener('click', resetBrandFormState);
    document.getElementById('cancelCategoryEditButton').addEventListener('click', resetCategoryFormState);
    document.getElementById('brandId').addEventListener('change', renderCategories);
    document.getElementById('categoryBrandId').addEventListener('change', renderCategoryParentOptions);
    document.getElementById('mobileAutofillShortcut').addEventListener('click', onAutofill);
    document.getElementById('mobileStickyAutofill').addEventListener('click', onAutofill);
    document.getElementById('mobileDriveFocusShortcut').addEventListener('click', () => focusField('driveUrl'));
    document.getElementById('mobileRecentShortcut').addEventListener('click', () => jumpToPanel('recentPanel'));
    document.getElementById('mobileSaveShortcut').addEventListener('click', () => document.getElementById('fileForm').requestSubmit());
    document.getElementById('fileFinderInput').addEventListener('input', onFileFinderInput);
    document.getElementById('fileFinderClearButton').addEventListener('click', clearFileFinder);
    document.getElementById('integrityFixButton').addEventListener('click', onFixFolderWarnings);
    document.getElementById('integrityScanButton').addEventListener('click', () => refreshIntegrityScan(false));
    document.getElementById('integrityToggleButton').addEventListener('click', toggleIntegrityDetails);
    document.getElementById('confirmCancelButton').addEventListener('click', () => closeConfirmDialog(false));
    document.getElementById('confirmAcceptButton').addEventListener('click', () => closeConfirmDialog(true));
    document.querySelectorAll('[data-confirm-close]').forEach((node) => {
      node.addEventListener('click', () => closeConfirmDialog(false));
    });
  });

  function bootstrap(data) {
    state.categories = data.categories || [];
    state.recentFiles = data.recentFiles || [];
    state.brands = (data.brands || []).length ? data.brands || [] : syncBrands();

    document.getElementById('sheetName').textContent = data.sheetName || 'Downloads';
    renderBrands();
    renderCategories();
    renderBrandRows();
    renderRecentRows();
    renderCategoryRows();
    renderIntegrityPanel();
    refreshIntegrityScan(true);
    syncMobileSaveButton(false);
  }

  function focusField(name) {
    const field = document.querySelector(`[name="${name}"]`);
    if (!field) return;

    field.scrollIntoView({ behavior: 'smooth', block: 'center' });
    window.setTimeout(() => {
      field.focus({ preventScroll: true });
    }, 180);
  }

  function jumpToPanel(id) {
    const panel = document.getElementById(id);
    if (!panel) return;
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function syncBrands() {
    return Array.from(
      new Map(
        state.categories.map((item) => [
          item.brandId,
          { id: item.brandId, label: item.brandLabel || capitalize(item.brandId) },
        ]),
      ).values(),
    );
  }

  function renderBrands() {
    const fileBrandSelect = document.getElementById('brandId');
    const categoryBrandSelect = document.getElementById('categoryBrandId');
    const currentFileValue = fileBrandSelect.value;
    const currentCategoryValue = categoryBrandSelect.value;
    const options = state.brands
      .map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.label)}</option>`)
      .join('');

    fileBrandSelect.innerHTML = options;
    categoryBrandSelect.innerHTML = options;

    if (!state.brands.length) {
      fileBrandSelect.innerHTML = '<option value="">No brands yet</option>';
      categoryBrandSelect.innerHTML = '<option value="">No brands yet</option>';
      return;
    }

    const nextFileValue = state.brands.some((item) => item.id === currentFileValue) ? currentFileValue : state.brands[0].id;
    const nextCategoryValue = state.brands.some((item) => item.id === currentCategoryValue) ? currentCategoryValue : state.brands[0].id;

    fileBrandSelect.value = nextFileValue;
    categoryBrandSelect.value = nextCategoryValue;
    renderCategoryParentOptions();
  }

  function getCategoriesForBrand(brandId) {
    return state.categories
      .filter((item) => item.brandId === brandId)
      .sort((left, right) => String(left.fullLabel || left.label || '').localeCompare(String(right.fullLabel || right.label || '')));
  }

  function getCategoryById(categoryId) {
    const targetId = String(categoryId || '').trim();
    return state.categories.find((item) => String(item.id || '').trim() === targetId) || null;
  }

  function getCategoryDescendantIds(categoryId) {
    const targetId = String(categoryId || '').trim();
    if (!targetId) return [];

    const childMap = new Map();
    state.categories.forEach((item) => {
      const parentId = String(item.parentCategoryId || '').trim();
      const itemId = String(item.id || '').trim();
      if (!parentId || !itemId) return;
      if (!childMap.has(parentId)) {
        childMap.set(parentId, []);
      }
      childMap.get(parentId).push(itemId);
    });

    const descendants = [];
    const seen = new Set();
    const queue = [...(childMap.get(targetId) || [])];

    while (queue.length) {
      const currentId = String(queue.shift() || '').trim();
      if (!currentId || seen.has(currentId)) continue;
      seen.add(currentId);
      descendants.push(currentId);
      queue.push(...(childMap.get(currentId) || []));
    }

    return descendants;
  }

  function getCategoryLabel(item) {
    return String((item && (item.fullLabel || item.label || item.id)) || '').trim();
  }

  function resolveCategoryPath(categoryId, fallbackLabel) {
    const category = getCategoryById(categoryId);
    return category ? getCategoryLabel(category) : String(fallbackLabel || categoryId || '-').trim() || '-';
  }

  function renderCategories() {
    const brandId = document.getElementById('brandId').value;
    const select = document.getElementById('categoryId');
    const currentValue = select.value;
    const filtered = getCategoriesForBrand(brandId);

    select.innerHTML = filtered.length
      ? filtered
        .map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(getCategoryLabel(item))}</option>`)
        .join('')
      : '<option value="">No categories for this brand</option>';

    if (filtered.length) {
      const nextValue = filtered.some((item) => item.id === currentValue) ? currentValue : filtered[0].id;
      select.value = nextValue;
    }
  }

  function renderCategoryParentOptions() {
    const brandId = document.getElementById('categoryBrandId').value;
    const select = document.getElementById('categoryParentId');
    if (!select) return;

    const currentValue = select.value;
    const blockedIds = new Set(
      state.categoryEditId
        ? [state.categoryEditId, ...getCategoryDescendantIds(state.categoryEditId)]
        : [],
    );
    const filtered = getCategoriesForBrand(brandId).filter((item) => !blockedIds.has(item.id));
    const editingItem = state.categoryEditId ? getCategoryById(state.categoryEditId) : null;

    select.innerHTML = [
      '<option value="">Top-level folder</option>',
      ...filtered.map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(getCategoryLabel(item))}</option>`),
    ].join('');

    const preferredValue = filtered.some((item) => item.id === currentValue)
      ? currentValue
      : String((editingItem && editingItem.parentCategoryId) || '').trim();

    select.value = filtered.some((item) => item.id === preferredValue) ? preferredValue : '';
  }

  function getVisibleFiles() {
    return state.searchQuery.trim() ? state.searchResults : state.recentFiles;
  }

  function findFileRecord(fileId) {
    const targetId = String(fileId || '').trim();
    if (!targetId) return null;

    const pools = [getVisibleFiles(), state.recentFiles, state.searchResults];
    for (const pool of pools) {
      const match = pool.find((item) => String(item.id || '').trim() === targetId);
      if (match) return match;
    }

    return null;
  }

  function onFileFinderInput(event) {
    const query = String(event.currentTarget.value || '').trim();
    state.searchQuery = query;

    if (fileSearchTimer) {
      window.clearTimeout(fileSearchTimer);
    }

    if (!query) {
      state.searchLoading = false;
      state.searchResults = [];
      state.searchTotal = 0;
      renderRecentRows();
      return;
    }

    state.searchLoading = true;
    renderRecentRows();
    fileSearchTimer = window.setTimeout(() => {
      runFileFinderQuery(query, true);
    }, 260);
  }

  function clearFileFinder() {
    if (fileSearchTimer) {
      window.clearTimeout(fileSearchTimer);
    }

    state.searchQuery = '';
    state.searchLoading = false;
    state.searchResults = [];
    state.searchTotal = 0;
    const input = document.getElementById('fileFinderInput');
    input.value = '';
    renderRecentRows();
    input.focus();
  }

  function runFileFinderQuery(query, silent) {
    const keyword = String(query || '').trim();
    if (!keyword) {
      clearFileFinder();
      return;
    }

    state.searchLoading = true;
    renderRecentRows();

    google.script.run
      .withSuccessHandler((response) => {
        if (String(state.searchQuery || '').trim() !== keyword) return;

        state.searchResults = response && Array.isArray(response.results) ? response.results : [];
        state.searchTotal = response ? Number(response.total || state.searchResults.length || 0) : state.searchResults.length;
        state.searchLoading = false;
        renderRecentRows();

        if (!silent) {
          showSuccess(state.searchTotal ? `Found ${state.searchTotal} matching file(s).` : 'No matching files were found.');
        }
      })
      .withFailureHandler((error) => {
        state.searchLoading = false;
        renderRecentRows();
        if (!silent) {
          showError(error);
        }
      })
      .searchDownloadFiles(keyword);
  }

  function refreshFileFinderIfNeeded() {
    const query = String(state.searchQuery || '').trim();
    if (!query) {
      renderRecentRows();
      return;
    }

    runFileFinderQuery(query, true);
  }

  function renderRecentRows() {
    const tbody = document.getElementById('recentRows');
    const meta = document.getElementById('fileFinderMeta');
    const visibleFiles = getVisibleFiles();

    if (state.searchLoading) {
      meta.textContent = `Searching all rows for "${state.searchQuery}"...`;
      tbody.innerHTML = '<tr><td colspan="8" class="muted">Searching all rows...</td></tr>';
      return;
    }

    if (state.searchQuery.trim()) {
      meta.textContent = state.searchTotal
        ? `Showing ${visibleFiles.length} of ${state.searchTotal} match(es) for "${state.searchQuery}".`
        : `No matches found for "${state.searchQuery}".`;
    } else {
      meta.textContent = 'Showing the latest 12 rows.';
    }

    if (!visibleFiles.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="muted">${state.searchQuery.trim() ? 'No matching files were found.' : 'No entries yet.'}</td></tr>`;
      return;
    }

    tbody.innerHTML = visibleFiles
      .map((item) => `
        <tr>
          <td>${escapeHtml(item.brandLabel || capitalize(item.brandId || ''))}</td>
          <td>${escapeHtml(resolveCategoryPath(item.categoryId, item.categoryLabel))}</td>
          <td>
            <strong>${escapeHtml(item.title)}</strong>
            <div class="finder-title-meta">${escapeHtml(item.id || '')}${item.rowNumber ? ` | Row ${escapeHtml(item.rowNumber)}` : ''}</div>
          </td>
          <td>${escapeHtml(item.date || '-')}</td>
          <td>${escapeHtml(item.size || '-')}</td>
          <td>${escapeHtml(item.price || 'Free')}</td>
          <td><span class="status-pill ${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-action" data-edit-file-id="${escapeHtml(item.id || '')}">Edit</button>
              <button type="button" class="row-action row-action-danger" data-delete-file-id="${escapeHtml(item.id || '')}">Delete</button>
            </div>
          </td>
        </tr>
      `)
      .join('');

    tbody.querySelectorAll('[data-edit-file-id]').forEach((button) => {
      button.addEventListener('click', () => startEdit(button.getAttribute('data-edit-file-id')));
    });

    tbody.querySelectorAll('[data-delete-file-id]').forEach((button) => {
      button.addEventListener('click', () => onDeleteFile(button.getAttribute('data-delete-file-id')));
    });
  }

  function renderBrandRows() {
    const tbody = document.getElementById('brandRows');

    if (!state.brands.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="muted">No brands yet.</td></tr>';
      return;
    }

    tbody.innerHTML = state.brands
      .map((item, index) => `
        <tr>
          <td><strong>${escapeHtml(item.label)}</strong></td>
          <td><code>${escapeHtml(item.id)}</code></td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-action" data-brand-edit-index="${index}">Edit</button>
              <button type="button" class="row-action row-action-danger" data-brand-delete-index="${index}">Delete</button>
            </div>
          </td>
        </tr>
      `)
      .join('');

    tbody.querySelectorAll('[data-brand-edit-index]').forEach((button) => {
      button.addEventListener('click', () => startBrandEdit(Number(button.getAttribute('data-brand-edit-index'))));
    });

    tbody.querySelectorAll('[data-brand-delete-index]').forEach((button) => {
      button.addEventListener('click', () => onDeleteBrand(Number(button.getAttribute('data-brand-delete-index'))));
    });
  }

  function renderCategoryRows() {
    const tbody = document.getElementById('categoryRows');

    if (!state.categories.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="muted">No folders yet.</td></tr>';
      return;
    }

    tbody.innerHTML = [...state.categories]
      .sort((left, right) => {
        const leftKey = `${left.brandLabel || left.brandId} ${left.fullLabel || left.label || left.id}`;
        const rightKey = `${right.brandLabel || right.brandId} ${right.fullLabel || right.label || right.id}`;
        return leftKey.localeCompare(rightKey);
      })
      .map((item) => `
        <tr>
          <td>${escapeHtml(item.brandLabel || capitalize(item.brandId || ''))}</td>
          <td>
            <strong>${escapeHtml(getCategoryLabel(item))}</strong>
            <div class="finder-title-meta">${item.parentCategoryLabel ? `Inside ${escapeHtml(item.parentCategoryLabel)}` : 'Top-level folder'}</div>
          </td>
          <td><code>${escapeHtml(item.id)}</code></td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-action" data-category-edit-id="${escapeHtml(item.id || '')}">Edit</button>
              <button type="button" class="row-action row-action-danger" data-category-delete-id="${escapeHtml(item.id || '')}">Delete</button>
            </div>
          </td>
        </tr>
      `)
      .join('');

    tbody.querySelectorAll('[data-category-edit-id]').forEach((button) => {
      button.addEventListener('click', () => startCategoryEdit(button.getAttribute('data-category-edit-id')));
    });

    tbody.querySelectorAll('[data-category-delete-id]').forEach((button) => {
      button.addEventListener('click', () => onDeleteCategory(button.getAttribute('data-category-delete-id')));
    });
  }

  function onBrandSubmit(event) {
    event.preventDefault();

    const form = event.currentTarget;
    const formData = new FormData(form);
    const originalBrandId = String(formData.get('originalBrandId') || '').trim();
    const brandLabel = String(formData.get('brandLabel') || '').trim();
    const brandId = String(formData.get('brandId') || '').trim() || slugify(brandLabel);

    setBrandSaving(true);
    hideFlash();

    const runner = google.script.run
      .withSuccessHandler((response) => {
        setBrandSaving(false);
        state.brands = response.brands || state.brands;
        state.categories = response.categories || state.categories;
        state.recentFiles = response.recentFiles || state.recentFiles;
        renderBrands();
        renderCategories();
        renderBrandRows();
        renderCategoryRows();
        renderRecentRows();
        resetFormState();
        resetCategoryFormState();
        resetBrandFormState();
        showSuccess(response.message || 'Brand saved.');
        refreshFileFinderIfNeeded();
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        setBrandSaving(false);
        showError(error);
      });

    if (state.brandEditId) {
      runner.updateBrand({ originalBrandId, brandId, brandLabel });
    } else {
      runner.addBrand({ brandId, brandLabel });
    }
  }

  function onSubmit(event) {
    event.preventDefault();

    const form = event.currentTarget;
    const formData = new FormData(form);
    const payload = {
      categoryId: formData.get('categoryId'),
      brandId: formData.get('brandId'),
      title: formData.get('title'),
      subtitle: formData.get('subtitle'),
      summary: formData.get('summary'),
      date: formData.get('date'),
      size: formData.get('size'),
      visits: formData.get('visits'),
      downloads: formData.get('downloads'),
      price: formData.get('price'),
      driveUrl: formData.get('driveUrl'),
      status: formData.get('status'),
      featured: formData.get('featured') === 'on',
      originalId: formData.get('originalId'),
    };

    setSaving(true);
    hideFlash();

    const runner = google.script.run
      .withSuccessHandler((response) => {
        setSaving(false);
        showSuccess(response.message || 'Saved.');
        state.recentFiles = response.recentFiles || [];
        refreshFileFinderIfNeeded();
        resetFormState();
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        setSaving(false);
        showError(error);
      });

    if (state.editId) {
      runner.updateDownloadFile(payload);
    } else {
      runner.addDownloadFile(payload);
    }
  }

  function onCategorySubmit(event) {
    event.preventDefault();

    const form = event.currentTarget;
    const formData = new FormData(form);
    const payload = {
      brandId: formData.get('brandId'),
      parentCategoryId: formData.get('parentCategoryId'),
      categoryLabel: formData.get('categoryLabel'),
      categoryId: formData.get('categoryId'),
      originalCategoryId: formData.get('originalCategoryId'),
    };

    setCategorySaving(true);
    hideFlash();

    const runner = google.script.run
      .withSuccessHandler((response) => {
        setCategorySaving(false);
        state.categories = response.categories || [];
        state.brands = response.brands || state.brands;
        renderBrands();
        renderCategories();
        renderBrandRows();
        renderCategoryRows();
        form.reset();
        document.getElementById('categoryBrandId').value = state.brands[0] ? state.brands[0].id : 'huawei';
        renderCategoryParentOptions();
        resetCategoryFormState();
        showSuccess(response.message || 'Folder added.');
        refreshFileFinderIfNeeded();
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        setCategorySaving(false);
        showError(error);
      });

    if (state.categoryEditId) {
      runner.updateCategory(payload);
    } else {
      runner.addCategory(payload);
    }
  }

  function onAutofill() {
    const driveInput = document.querySelector('[name="driveUrl"]');
    const note = document.getElementById('autofillNote');
    const url = (driveInput.value || '').trim();

    if (!url) {
      note.textContent = 'Paste the Google Drive link first.';
      return;
    }

    note.textContent = 'Reading file info from Google Drive...';

    google.script.run
      .withSuccessHandler((meta) => {
        const subtitleInput = document.querySelector('[name="subtitle"]');
        const summaryInput = document.querySelector('[name="summary"]');
        const sizeInput = document.querySelector('[name="size"]');

        if (!subtitleInput.value) {
          subtitleInput.value = meta.name || '';
        }

        if (!summaryInput.value) {
          summaryInput.value = meta.name || '';
        }

        if (!sizeInput.value) {
          sizeInput.value = meta.size || '';
        }

        note.textContent = `Detected: ${meta.name || 'Unknown file'} ${meta.size ? '(' + meta.size + ')' : ''}`;
      })
      .withFailureHandler((error) => {
        note.textContent = error && error.message ? error.message : 'Drive metadata could not be loaded.';
      })
      .getDriveFileMeta(url);
  }

  function setSaving(isSaving) {
    const button = document.getElementById('saveButton');
    button.disabled = isSaving;
    button.textContent = isSaving ? 'Saving...' : state.editId ? 'Update File' : 'Save File';
    syncMobileSaveButton(isSaving);
  }

  function setBrandSaving(isSaving) {
    const button = document.getElementById('brandSaveButton');
    if (!button) return;

    button.disabled = Boolean(isSaving);
    button.textContent = isSaving ? (state.brandEditId ? 'Updating...' : 'Adding...') : state.brandEditId ? 'Update Brand' : 'Add Brand';
  }

  function setCategorySaving(isSaving) {
    const button = document.getElementById('categorySaveButton');
    if (!button) return;

    button.disabled = Boolean(isSaving);
    button.textContent = isSaving ? (state.categoryEditId ? 'Updating...' : 'Adding...') : state.categoryEditId ? 'Update Folder' : 'Add Folder';
  }

  function syncMobileSaveButton(isSaving) {
    const button = document.getElementById('mobileSaveShortcut');
    if (!button) return;

    button.disabled = Boolean(isSaving);
    button.textContent = isSaving ? 'Saving...' : state.editId ? 'Update File' : 'Save File';
  }

  function startEdit(fileId) {
    const item = findFileRecord(fileId);
    if (!item) return;

    state.editId = item.id;

    document.querySelector('[name="originalId"]').value = item.id || '';
    document.querySelector('[name="brandId"]').value = item.brandId || 'huawei';
    renderCategories();
    document.querySelector('[name="categoryId"]').value = item.categoryId || '';
    document.querySelector('[name="title"]').value = item.title || '';
    document.querySelector('[name="subtitle"]').value = item.subtitle || '';
    document.querySelector('[name="summary"]').value = item.summary || '';
    document.querySelector('[name="date"]').value = item.date || '';
    document.querySelector('[name="size"]').value = item.size || '';
    document.querySelector('[name="visits"]').value = item.visits || '';
    document.querySelector('[name="downloads"]').value = item.downloads || '';
    document.querySelector('[name="price"]').value = item.price || '';
    document.querySelector('[name="driveUrl"]').value = item.driveUrl || '';
    document.querySelector('[name="status"]').value = item.status || 'published';
    document.querySelector('[name="featured"]').checked = item.featured === true;

    document.getElementById('saveButton').textContent = 'Update File';
    document.getElementById('cancelEditButton').classList.remove('hidden');
    document.getElementById('autofillNote').textContent = 'Editing mode is active.';
    syncMobileSaveButton(false);
    hideFlash();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function startBrandEdit(index) {
    const item = state.brands[index];
    if (!item) return;

    state.brandEditId = item.id;
    const form = document.getElementById('brandForm');
    form.querySelector('[name="originalBrandId"]').value = item.id || '';
    form.querySelector('[name="brandLabel"]').value = item.label || '';
    form.querySelector('[name="brandId"]').value = item.id || '';
    form.querySelector('[name="brandId"]').readOnly = true;
    document.getElementById('brandIdNote').textContent = 'Brand ID stays locked to keep links stable. Edit the label only.';
    document.getElementById('brandSaveButton').textContent = 'Update Brand';
    document.getElementById('cancelBrandEditButton').classList.remove('hidden');
    hideFlash();
  }

  function resetBrandFormState() {
    state.brandEditId = '';
    const form = document.getElementById('brandForm');
    form.reset();
    form.querySelector('[name="originalBrandId"]').value = '';
    form.querySelector('[name="brandId"]').readOnly = false;
    document.getElementById('brandIdNote').textContent = 'Leave empty to auto-generate the brand ID.';
    document.getElementById('brandSaveButton').textContent = 'Add Brand';
    document.getElementById('cancelBrandEditButton').classList.add('hidden');
  }

  function resetFormState() {
    state.editId = '';
    const form = document.getElementById('fileForm');
    form.reset();

    if (state.categories.length) {
      document.getElementById('brandId').value = state.brands[0] ? state.brands[0].id : 'huawei';
      renderCategories();
      const defaultCategory = getCategoriesForBrand(document.getElementById('brandId').value)[0];
      document.getElementById('categoryId').value = defaultCategory ? defaultCategory.id : '';
    }

    document.querySelector('[name="originalId"]').value = '';
    document.getElementById('saveButton').textContent = 'Save File';
    document.getElementById('cancelEditButton').classList.add('hidden');
    document.getElementById('autofillNote').textContent = '';
    document.getElementById('categoryBrandId').value = state.brands[0] ? state.brands[0].id : 'huawei';
    syncMobileSaveButton(false);
    hideFlash();
  }

  function startCategoryEdit(categoryId) {
    const item = getCategoryById(categoryId);
    if (!item) return;

    state.categoryEditId = item.id;
    document.querySelector('#categoryForm [name="originalCategoryId"]').value = item.id || '';
    document.querySelector('#categoryForm [name="brandId"]').value = item.brandId || 'huawei';
    renderCategoryParentOptions();
    document.querySelector('#categoryForm [name="parentCategoryId"]').value = item.parentCategoryId || '';
    document.querySelector('#categoryForm [name="categoryLabel"]').value = item.label || '';
    document.querySelector('#categoryForm [name="categoryId"]').value = item.id || '';
    document.getElementById('categorySaveButton').textContent = 'Update Folder';
    document.getElementById('cancelCategoryEditButton').classList.remove('hidden');
    hideFlash();
  }

  function resetCategoryFormState() {
    state.categoryEditId = '';
    const form = document.getElementById('categoryForm');
    form.reset();
    document.querySelector('#categoryForm [name="originalCategoryId"]').value = '';
    document.getElementById('categorySaveButton').textContent = 'Add Folder';
    document.getElementById('cancelCategoryEditButton').classList.add('hidden');
    document.getElementById('categoryBrandId').value = state.brands[0] ? state.brands[0].id : 'huawei';
    renderCategoryParentOptions();
  }

  async function onDeleteBrand(index) {
    const item = state.brands[index];
    if (!item) return;

    const confirmed = await showConfirmDialog({
      eyebrow: 'Delete Brand',
      title: `Delete ${item.label}?`,
      message: 'This works only when the brand has no linked folders or files.',
      confirmLabel: 'Delete Brand',
      danger: true,
    });
    if (!confirmed) return;

    hideFlash();

    google.script.run
      .withSuccessHandler((response) => {
        state.brands = response.brands || [];
        state.categories = response.categories || [];
        state.recentFiles = response.recentFiles || state.recentFiles;
        renderBrands();
        renderCategories();
        renderBrandRows();
        renderCategoryRows();
        renderRecentRows();
        resetBrandFormState();
        resetCategoryFormState();
        showSuccess(response.message || 'Brand deleted.');
        refreshFileFinderIfNeeded();
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        showError(error);
      })
      .deleteBrand(item.id);
  }

  async function onDeleteCategory(categoryId) {
    const item = getCategoryById(categoryId);
    if (!item) return;

    const confirmed = await showConfirmDialog({
      eyebrow: 'Delete Folder',
      title: `Delete ${getCategoryLabel(item)}?`,
      message: `Remove this folder from ${item.brandLabel || capitalize(item.brandId || '')}. This only works when no files or subfolders are linked.`,
      confirmLabel: 'Delete Folder',
      danger: true,
    });
    if (!confirmed) return;

    hideFlash();

    google.script.run
      .withSuccessHandler((response) => {
        state.categories = response.categories || [];
        state.brands = response.brands || state.brands;
        renderBrands();
        renderCategories();
        renderCategoryRows();
        resetCategoryFormState();
        showSuccess(response.message || 'Folder deleted.');
        refreshFileFinderIfNeeded();
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        showError(error);
      })
      .deleteCategory(item.id);
  }

  async function onDeleteFile(fileId) {
    const item = findFileRecord(fileId);
    if (!item) return;

    const confirmed = await showConfirmDialog({
      eyebrow: 'Delete File',
      title: 'Delete this file?',
      message: item.title || 'This file will be removed from admin and public data.',
      confirmLabel: 'Delete File',
      danger: true,
    });
    if (!confirmed) return;

    hideFlash();

    google.script.run
      .withSuccessHandler((response) => {
        state.recentFiles = response.recentFiles || [];
        refreshFileFinderIfNeeded();
        resetFormState();
        showSuccess(response.message || 'File deleted.');
        refreshIntegrityScan(true);
      })
      .withFailureHandler((error) => {
        showError(error);
      })
      .deleteDownloadFile(item.id);
  }

  function refreshIntegrityScan(silent) {
    state.integrityLoading = true;
    renderIntegrityPanel();

    google.script.run
      .withSuccessHandler((report) => {
        state.integrity = report || null;
        state.integrityLoading = false;
        renderIntegrityPanel();

        if (!silent) {
          const totalIssues = report && report.summary ? Number(report.summary.totalIssues || 0) : 0;
          showSuccess(totalIssues ? `Integrity scan finished with ${totalIssues} issue(s).` : 'Integrity scan finished. No issues found.');
        }
      })
      .withFailureHandler((error) => {
        state.integrityLoading = false;
        renderIntegrityPanel(error);

        if (!silent) {
          showError(error);
        }
      })
      .runIntegrityScan();
  }

  async function onFixFolderWarnings() {
    const report = state.integrity;
    const summary = report && report.summary ? report.summary : null;
    const fixableRows = summary ? Number(summary.fixableCategoryRows || 0) : 0;
    if (!fixableRows) {
      showSuccess('No incomplete folder rows were found.');
      return;
    }

    const confirmed = await showConfirmDialog({
      eyebrow: 'Auto Fix Folders',
      title: 'Delete incomplete folder rows?',
      message: `This will remove ${fixableRows} broken folder row${fixableRows === 1 ? '' : 's'} from Settings. Valid categories and files stay untouched.`,
      confirmLabel: 'Fix Now',
      danger: true,
    });
    if (!confirmed) return;

    hideFlash();
    state.integrityLoading = true;
    renderIntegrityPanel();

    google.script.run
      .withSuccessHandler((response) => {
        state.integrityLoading = false;
        state.brands = response.brands || state.brands;
        state.categories = response.categories || state.categories;
        state.recentFiles = response.recentFiles || state.recentFiles;
        state.integrity = response.report || null;
        renderBrands();
        renderCategories();
        renderBrandRows();
        renderCategoryRows();
        renderRecentRows();
        renderIntegrityPanel();
        resetCategoryFormState();
        showSuccess(response.message || 'Folder warnings fixed.');
      })
      .withFailureHandler((error) => {
        state.integrityLoading = false;
        renderIntegrityPanel(error);
        showError(error);
      })
      .repairIncompleteCategoryRows();
  }

  function toggleIntegrityDetails() {
    if (!state.integrity || !Array.isArray(state.integrity.issues) || !state.integrity.issues.length) return;
    state.integrityExpanded = !state.integrityExpanded;
    renderIntegrityPanel();
  }

  function renderIntegrityPanel(error) {
    const badge = document.getElementById('integrityStatusBadge');
    const summary = document.getElementById('integritySummary');
    const issues = document.getElementById('integrityIssues');
    const button = document.getElementById('integrityScanButton');
    const fixButton = document.getElementById('integrityFixButton');
    const toggleButton = document.getElementById('integrityToggleButton');
    const report = state.integrity;
    const summaryData = report && report.summary ? report.summary : null;
    const issueItems = report && Array.isArray(report.issues) ? report.issues : [];
    const totalIssues = summaryData ? Number(summaryData.totalIssues || issueItems.length || 0) : issueItems.length;
    const fixableCategoryRows = summaryData ? Number(summaryData.fixableCategoryRows || 0) : 0;

    button.disabled = state.integrityLoading;
    button.textContent = state.integrityLoading ? 'Scanning...' : 'Run Scan';
    fixButton.disabled = state.integrityLoading;
    toggleButton.disabled = state.integrityLoading;

    badge.className = 'integrity-status';

    if (state.integrityLoading) {
      badge.classList.add('loading');
      badge.textContent = 'Scanning data...';
    } else if (error) {
      badge.classList.add('critical');
      badge.textContent = 'Scan failed';
    } else if (!report) {
      badge.textContent = 'Not scanned yet';
    } else if (report.status === 'clean') {
      badge.classList.add('clean');
      badge.textContent = 'Structure looks clean';
    } else if (report.status === 'critical') {
      badge.classList.add('critical');
      badge.textContent = 'Critical issues found';
    } else {
      badge.classList.add('warning');
      badge.textContent = 'Warnings found';
    }

    if (!report && !error) {
      summary.innerHTML = '<div class="integrity-empty">Run a scan to verify the current sheet structure.</div>';
      issues.classList.add('hidden');
      issues.innerHTML = '';
      fixButton.classList.add('hidden');
      toggleButton.classList.add('hidden');
      return;
    }

    if (error) {
      summary.innerHTML = '<div class="integrity-empty">The integrity scan could not finish. Try again after checking your sheet connection.</div>';
      fixButton.classList.add('hidden');
      toggleButton.classList.add('hidden');
      issues.classList.remove('hidden');
      issues.innerHTML = `
        <article class="integrity-issue critical">
          <div class="integrity-issue-top">
            <strong>Scan error</strong>
            <span class="integrity-issue-level critical">Critical</span>
          </div>
          <p class="muted">${escapeHtml(error && error.message ? error.message : 'Something went wrong while checking the sheet.')}</p>
        </article>
      `;
      return;
    }

    fixButton.classList.toggle('hidden', !fixableCategoryRows);
    fixButton.textContent = fixableCategoryRows
      ? `Fix Folder Warnings (${fixableCategoryRows})`
      : 'Fix Folder Warnings';
    toggleButton.classList.toggle('hidden', !totalIssues);
    toggleButton.textContent = state.integrityExpanded ? 'Hide Details' : `Show Details (${totalIssues})`;

    summary.innerHTML = `
      <article class="integrity-summary-card">
        <span class="integrity-summary-label">Brands</span>
        <strong class="integrity-summary-value">${escapeHtml(summaryData.brands || 0)}</strong>
      </article>
      <article class="integrity-summary-card">
        <span class="integrity-summary-label">Folders</span>
        <strong class="integrity-summary-value">${escapeHtml(summaryData.categories || 0)}</strong>
      </article>
      <article class="integrity-summary-card">
        <span class="integrity-summary-label">Files</span>
        <strong class="integrity-summary-value">${escapeHtml(summaryData.files || 0)}</strong>
      </article>
      <article class="integrity-summary-card">
        <span class="integrity-summary-label">Critical</span>
        <strong class="integrity-summary-value">${escapeHtml(summaryData.critical || 0)}</strong>
      </article>
      <article class="integrity-summary-card">
        <span class="integrity-summary-label">Warnings</span>
        <strong class="integrity-summary-value">${escapeHtml(summaryData.warning || 0)}</strong>
      </article>
      <div class="integrity-scan-meta">Checked ${escapeHtml(formatDateTime(report.checkedAt))}${totalIssues ? escapeHtml(` • ${state.integrityExpanded ? 'Detailed issues are open below.' : 'Open details only when you need to review the findings.'}`) : ''}</div>
    `;

    if (!issueItems.length) {
      issues.classList.add('hidden');
      issues.innerHTML = '';
      toggleButton.classList.add('hidden');
      return;
    }

    if (!state.integrityExpanded) {
      issues.classList.add('hidden');
      issues.innerHTML = '';
      return;
    }

    issues.classList.remove('hidden');

    issues.innerHTML = issueItems
      .map((item) => {
        const level = item && item.level === 'critical' ? 'critical' : 'warning';
        return `
          <article class="integrity-issue ${level}">
            <div class="integrity-issue-top">
              <strong>${escapeHtml(item && item.title ? item.title : 'Integrity issue')}</strong>
              <span class="integrity-issue-level ${level}">${escapeHtml(level)}</span>
            </div>
            <p class="muted">${escapeHtml(item && item.detail ? item.detail : 'Please review this row.')}</p>
          </article>
        `;
      })
      .join('') + (totalIssues > issueItems.length
        ? `
          <article class="integrity-issue">
            <div class="integrity-issue-top">
              <strong>Additional findings exist</strong>
              <span class="integrity-issue-level warning">Notice</span>
            </div>
            <p class="muted">This panel shows the first ${issueItems.length} findings to keep the admin page compact. Fix the current issues, then scan again for the next batch.</p>
          </article>
        `
        : '');
  }

  function formatDateTime(value) {
    const text = String(value || '').trim();
    if (!text) return 'just now';

    const parsed = new Date(text);
    if (Number.isNaN(parsed.getTime())) {
      return text;
    }

    return parsed.toLocaleString();
  }

  function showConfirmDialog(options) {
    const modal = document.getElementById('confirmModal');
    const eyebrow = document.getElementById('confirmEyebrow');
    const title = document.getElementById('confirmTitle');
    const message = document.getElementById('confirmMessage');
    const acceptButton = document.getElementById('confirmAcceptButton');

    eyebrow.textContent = options && options.eyebrow ? options.eyebrow : 'Confirm Action';
    title.textContent = options && options.title ? options.title : 'Continue?';
    message.textContent = options && options.message ? options.message : 'Please confirm this action.';
    acceptButton.textContent = options && options.confirmLabel ? options.confirmLabel : 'Confirm';
    acceptButton.classList.toggle('danger', Boolean(options && options.danger));

    modal.classList.remove('hidden');
    modal.setAttribute('aria-hidden', 'false');

    return new Promise((resolve) => {
      state.confirmResolver = resolve;
    });
  }

  function closeConfirmDialog(accepted) {
    const modal = document.getElementById('confirmModal');
    const resolver = state.confirmResolver;

    modal.classList.add('hidden');
    modal.setAttribute('aria-hidden', 'true');
    state.confirmResolver = null;

    if (resolver) {
      resolver(Boolean(accepted));
    }
  }

  function showSuccess(message) {
    const flash = document.getElementById('flash');
    flash.classList.remove('hidden');
    flash.textContent = message;
    flash.style.background = 'rgba(46, 160, 67, 0.14)';
    flash.style.borderColor = 'rgba(46, 160, 67, 0.35)';
    flash.style.color = '#7ee787';
    flash.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showError(error) {
    const flash = document.getElementById('flash');
    flash.classList.remove('hidden');
    flash.textContent = error && error.message ? error.message : 'Something went wrong.';
    flash.style.background = 'rgba(248, 81, 73, 0.12)';
    flash.style.borderColor = 'rgba(248, 81, 73, 0.35)';
    flash.style.color = '#ffb4ad';
    flash.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideFlash() {
    const flash = document.getElementById('flash');
    flash.classList.add('hidden');
  }

  function escapeHtml(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function capitalize(value) {
    const text = String(value || '');
    return text ? text.charAt(0).toUpperCase() + text.slice(1) : '';
  }

  function slugify(value) {
    return String(value || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }
</script>
