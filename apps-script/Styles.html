<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-soft: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f85149;
    --accent-soft: rgba(248, 81, 73, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Segoe UI, Arial, sans-serif;
    background: linear-gradient(180deg, #0d1117 0%, #11161d 100%);
    color: var(--text);
    -webkit-text-size-adjust: 100%;
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 28px 22px;
    background: rgba(13, 17, 23, 0.92);
  }

  .brand-block h1,
  .hero-panel h2,
  .panel-head h3 {
    margin: 0;
  }

  .eyebrow,
  .card-label {
    margin: 0 0 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7d8590;
  }

  .muted {
    color: var(--muted);
    line-height: 1.6;
  }

  .side-card,
  .panel,
  .hero-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
  }

  .side-card {
    margin-top: 18px;
    padding: 18px;
  }

  .compact-list {
    margin: 0;
    padding-left: 18px;
    color: var(--muted);
  }

  .stack-form {
    display: grid;
    gap: 12px;
  }

  .content {
    padding: 28px;
  }

  .hero-panel {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: start;
    padding: 22px 24px;
    margin-bottom: 20px;
  }

  .flash {
    min-width: 220px;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--accent-soft);
    border: 1px solid rgba(248, 81, 73, 0.35);
    color: #ffb4ad;
  }

  .hidden {
    display: none;
  }

  .visually-hidden {
    display: none;
  }

  .mobile-quick-strip,
  .mobile-sticky-actions {
    display: none;
  }

  .grid {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
    gap: 20px;
  }

  .panel {
    padding: 22px;
  }

  .panel-head {
    margin-bottom: 18px;
  }

  .panel-head.compact {
    margin-bottom: 14px;
  }

  .panel-head p {
    margin: 6px 0 0;
    color: var(--muted);
  }

  .integrity-panel {
    margin-bottom: 20px;
    padding: 22px;
  }

  .integrity-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 18px;
    margin-bottom: 18px;
  }

  .integrity-head h3 {
    margin: 0;
  }

  .integrity-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .integrity-status {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .integrity-status.clean {
    color: #7ee787;
    border-color: rgba(46, 160, 67, 0.3);
    background: rgba(46, 160, 67, 0.12);
  }

  .integrity-status.warning {
    color: #f2cc60;
    border-color: rgba(242, 204, 96, 0.3);
    background: rgba(242, 204, 96, 0.12);
  }

  .integrity-status.critical {
    color: #ffb4ad;
    border-color: rgba(248, 81, 73, 0.35);
    background: rgba(248, 81, 73, 0.12);
  }

  .integrity-status.loading {
    color: #9bbcff;
    border-color: rgba(88, 166, 255, 0.28);
    background: rgba(88, 166, 255, 0.1);
  }

  .integrity-summary {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .integrity-summary-card,
  .integrity-empty,
  .integrity-scan-meta,
  .integrity-issue {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.02);
  }

  .integrity-summary-card {
    padding: 14px;
  }

  .integrity-summary-label {
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .integrity-summary-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
  }

  .integrity-empty,
  .integrity-scan-meta {
    grid-column: 1 / -1;
    padding: 14px 16px;
    color: var(--muted);
  }

  .integrity-issues {
    display: grid;
    gap: 12px;
  }

  .integrity-issue {
    padding: 14px 16px;
  }

  .integrity-issue.critical {
    border-color: rgba(248, 81, 73, 0.32);
    background: rgba(248, 81, 73, 0.08);
  }

  .integrity-issue.warning {
    border-color: rgba(242, 204, 96, 0.24);
    background: rgba(242, 204, 96, 0.06);
  }

  .integrity-issue-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }

  .integrity-issue-top strong {
    display: block;
  }

  .integrity-issue-level {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 82px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .integrity-issue-level.critical {
    color: #ffb4ad;
    background: rgba(248, 81, 73, 0.14);
  }

  .integrity-issue-level.warning {
    color: #f2cc60;
    background: rgba(242, 204, 96, 0.14);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  label {
    display: grid;
    gap: 8px;
  }

  label span {
    font-size: 14px;
    color: #c9d1d9;
  }

  .full {
    grid-column: 1 / -1;
  }

  input,
  textarea,
  select,
  button {
    font: inherit;
  }

  input,
  textarea,
  select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--text);
  }

  textarea {
    resize: vertical;
    min-height: 110px;
  }

  .switch-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .switch-row input {
    width: auto;
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .autofill-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .field-note {
    color: var(--muted);
    font-size: 12px;
  }

  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    background: var(--accent);
    color: white;
    font-weight: 700;
  }

  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  button:disabled {
    opacity: 0.65;
    cursor: wait;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  .compact-table th,
  .compact-table td {
    padding: 10px 12px;
    font-size: 13px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  th {
    font-size: 13px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.02);
  }

  .status-pill {
    display: inline-flex;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(46, 160, 67, 0.14);
    color: #7ee787;
  }

  .status-pill.draft {
    background: rgba(248, 81, 73, 0.14);
    color: #ffa198;
  }

  .row-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 7px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .row-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .row-action-danger {
    color: #ffa198;
    border-color: rgba(248, 81, 73, 0.24);
    background: rgba(248, 81, 73, 0.08);
  }

  button.danger {
    background: var(--accent);
    color: #fff;
  }

  .confirm-modal {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: grid;
    place-items: center;
    padding: 18px;
  }

  .confirm-modal.hidden {
    display: none;
  }

  .confirm-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(3, 6, 12, 0.72);
    backdrop-filter: blur(8px);
  }

  .confirm-card {
    position: relative;
    width: min(100%, 440px);
    padding: 22px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(22, 27, 34, 0.98), rgba(13, 17, 23, 0.98));
    box-shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
  }

  .confirm-card h3 {
    margin: 0 0 10px;
  }

  .quick-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0.68rem 0.9rem;
    border-radius: 999px;
    border: 1px solid rgba(248, 81, 73, 0.16);
    background: rgba(248, 81, 73, 0.12);
    color: #ffd4cf;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .quick-chip.ghost {
    border-color: var(--border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
  }

  @media (max-width: 980px) {
    body {
      padding-bottom: 88px;
    }

    .app-shell,
    .grid,
    .form-grid {
      grid-template-columns: 1fr;
    }

    .sidebar {
      border-right: 0;
      border-bottom: 1px solid var(--border);
      padding: 18px 16px;
    }

    .content {
      padding: 18px 16px 28px;
    }

    .hero-panel {
      flex-direction: column;
      padding: 18px;
    }

    .integrity-head,
    .integrity-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .integrity-summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mobile-quick-strip {
      display: flex;
      gap: 10px;
      margin: 0 0 16px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .mobile-quick-strip::-webkit-scrollbar {
      display: none;
    }

    .side-card,
    .panel {
      padding: 18px;
    }

    .actions,
    .autofill-row,
    .row-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .actions > *,
    .autofill-row > *,
    .row-actions > * {
      width: 100%;
    }

    input,
    textarea,
    select,
    button,
    .row-action {
      font-size: 16px;
    }

    th,
    td {
      padding: 10px 12px;
    }

    .mobile-sticky-actions {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 40;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(13, 17, 23, 0.96);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(12px);
    }

    .mobile-sticky-actions button {
      min-height: 46px;
      padding: 12px 10px;
      border-radius: 12px;
    }
  }
</style>
